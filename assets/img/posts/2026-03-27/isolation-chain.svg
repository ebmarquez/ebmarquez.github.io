<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect x="0" y="0" width="900" height="180" rx="10" fill="#1a1a2e"/>

  <!-- VM -->
  <rect x="20" y="50" width="110" height="70" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="75" y="80" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">VM</text>
  <text x="75" y="100" text-anchor="middle" fill="#a8d8ea" font-size="11">VLAN 201</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="85" x2="160" y2="85" stroke="#533483" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="145" y="75" text-anchor="middle" fill="#888" font-size="9">802.1Q</text>

  <!-- vSwitch -->
  <rect x="160" y="50" width="110" height="70" rx="8" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="215" y="80" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">vSwitch</text>
  <text x="215" y="100" text-anchor="middle" fill="#a8d8ea" font-size="11">Hyper-V SET</text>

  <!-- Arrow 2 -->
  <line x1="270" y1="85" x2="300" y2="85" stroke="#533483" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="285" y="75" text-anchor="middle" fill="#888" font-size="9">trunk</text>

  <!-- Physical NIC -->
  <rect x="300" y="50" width="110" height="70" rx="8" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="355" y="80" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">NIC</text>
  <text x="355" y="100" text-anchor="middle" fill="#a8d8ea" font-size="11">Physical</text>

  <!-- Arrow 3 -->
  <line x1="410" y1="85" x2="440" y2="85" stroke="#533483" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- TOR Switch -->
  <rect x="440" y="50" width="110" height="70" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="1.5"/>
  <text x="495" y="80" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">TOR</text>
  <text x="495" y="100" text-anchor="middle" fill="#a8d8ea" font-size="11">VLAN → VNI</text>

  <!-- Arrow 4 -->
  <line x1="550" y1="85" x2="580" y2="85" stroke="#533483" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="75" text-anchor="middle" fill="#888" font-size="9">VXLAN</text>

  <!-- VXLAN Tunnel -->
  <rect x="580" y="50" width="130" height="70" rx="8" fill="#0f3460" stroke="#533483" stroke-width="1.5"/>
  <text x="645" y="80" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">Tunnel</text>
  <text x="645" y="100" text-anchor="middle" fill="#a8d8ea" font-size="11">VNI 10201</text>

  <!-- Arrow 5 -->
  <line x1="710" y1="85" x2="740" y2="85" stroke="#533483" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- VRF -->
  <rect x="740" y="50" width="130" height="70" rx="8" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="805" y="80" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">VRF</text>
  <text x="805" y="100" text-anchor="middle" fill="#a8d8ea" font-size="11">WORKLOAD</text>

  <!-- Caption -->
  <text x="450" y="155" text-anchor="middle" fill="#888" font-size="12" font-style="italic">Isolation enforced at every hop — VM to fabric</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#533483"/>
    </marker>
  </defs>
</svg>
